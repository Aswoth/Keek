
name: Telegram 跳转
description: 将 电报 重定向到你选择的 Telegram 客户端
｛因为目前Nagram没有自己的scheme而是劫持了tg官方的，优先级比官方还高。故目前选nagram会跳转到tg（反正他也会劫持🌚）用官方的也会被劫持到nagram，如果介意可以用原版“https://raw.githubusercontent.com/IBL3ND/module/refs/heads/main/Telegram.yaml”｝
author: panda𝕏
icon: https://iili.io/KQX347S.png

env_schema:
  CLIENT:
    name: Telegram 客户端
    description: 选择要跳转到的 Telegram 客户端
    default_value: Telegram
    options:
      - Telegram
      - Swiftgram
      - Turrit
      - iMe
      - Nicegram
      - Lingogram
      - Nagram

dns: {}

scriptings:
  - http_request:
      name: Telegram 链接重定向
      match: ^https?://t\.me/.+
      script_url: https://raw.githubusercontent.com/Aswoth/Keek/refs/heads/main/TGRedirect.js
      timeout: 10

mitm:
  hostnames:
    - t.me
